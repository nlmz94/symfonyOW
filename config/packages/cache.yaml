framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        prefix_seed: 'onlyweebs_'

        # Use Redis for production caching (uncomment and configure when available)
        # app: cache.adapter.redis
        # default_redis_provider: 'redis://localhost'

        # For development, use filesystem cache
        app: cache.adapter.filesystem

        # Configure cache pools for different purposes
        pools:
            # Cache pool for Doctrine metadata (long-lived, rarely changes)
            doctrine.system_cache_pool:
                adapter: cache.system

            # Cache pool for Doctrine query results (medium-lived)
            doctrine.result_cache_pool:
                adapter: cache.app
                default_lifetime: 3600 # 1 hour

            # Cache pool for Doctrine second-level cache (medium-lived)
            doctrine.second_level_cache_pool:
                adapter: cache.app
                default_lifetime: 1800 # 30 minutes

            # Cache pool for application data (short-lived)
            app.cache_pool:
                adapter: cache.app
                default_lifetime: 900 # 15 minutes

when@prod:
    framework:
        cache:
            app: cache.adapter.filesystem

            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                    default_lifetime: 7200 # 2 hours

                doctrine.second_level_cache_pool:
                    adapter: cache.app
                    default_lifetime: 3600 # 1 hour

                app.cache_pool:
                    adapter: cache.app
                    default_lifetime: 1800 # 30 minutes
